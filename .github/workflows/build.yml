name: Build Windows App

# main へ push すると自動でビルドされ、GitHub の Releases に公開されます。
# インストール済みのアプリは、この Release を見て自動アップデートします。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: バージョンを自動採番（1.0.実行番号）
        shell: bash
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.version='1.0.'+process.env.GITHUB_RUN_NUMBER;fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('version =',p.version)"

      - name: 依存関係をインストール
        run: npm ci

      - name: レンダラー/メインをビルド
        run: npm run build

      - name: パッケージ化して Release に公開
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
