<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>DayDream Studio</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
      body {
        font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
        display: flex; align-items: center; justify-content: center;
        user-select: none; -webkit-user-select: none;
      }

      .card {
        position: relative;
        width: 100%; height: 100%;
        border-radius: 20px;
        overflow: hidden;
        background:
          radial-gradient(900px 500px at 15% 10%, #67e8f9 0%, transparent 55%),
          radial-gradient(800px 500px at 85% 15%, #f9a8d4 0%, transparent 55%),
          radial-gradient(900px 600px at 50% 100%, #c4b5fd 0%, transparent 60%),
          linear-gradient(135deg, #22d3ee 0%, #a855f7 50%, #ec4899 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        box-shadow: 0 24px 70px rgba(76, 29, 149, 0.45);
      }
      /* 動くカラフルな光 */
      .aurora {
        position: absolute; inset: -40%;
        background:
          radial-gradient(closest-side, rgba(34,211,238,0.85), transparent 70%) 10% 30%/45% 45% no-repeat,
          radial-gradient(closest-side, rgba(236,72,153,0.85), transparent 70%) 85% 25%/45% 45% no-repeat,
          radial-gradient(closest-side, rgba(250,204,21,0.7), transparent 70%) 50% 85%/40% 40% no-repeat,
          radial-gradient(closest-side, rgba(74,222,128,0.6), transparent 70%) 20% 80%/40% 40% no-repeat;
        filter: blur(28px);
        animation: swirl 9s ease-in-out infinite alternate;
      }
      @keyframes swirl {
        0%   { transform: rotate(0deg) scale(1); }
        100% { transform: rotate(22deg) scale(1.18); }
      }
      /* 光沢 */
      .sheen {
        position: absolute; top: 0; left: -60%;
        width: 45%; height: 100%;
        background: linear-gradient(100deg, transparent, rgba(255,255,255,0.5), transparent);
        transform: skewX(-18deg);
        animation: sheen 2.6s ease-in-out 0.5s infinite;
      }
      @keyframes sheen { 0% { left: -60%; } 60%, 100% { left: 130%; } }

      .inner { position: relative; z-index: 2; text-align: center; }

      /* ロゴ：再生マーク */
      .logo {
        width: 108px; height: 108px; margin: 0 auto 22px;
        border-radius: 28px;
        background: rgba(255,255,255,0.96);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 14px 40px rgba(49, 10, 87, 0.4), inset 0 0 0 1px rgba(255,255,255,0.7);
        animation: pop 0.7s cubic-bezier(.2,1.5,.4,1) both, float 3.2s ease-in-out 0.7s infinite;
      }
      .logo svg { width: 54px; height: 54px; margin-left: 6px; }
      @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes float { 0%,100% { translate: 0 0; } 50% { translate: 0 -8px; } }

      h1 {
        font-size: 30px; font-weight: 900; color: #fff; letter-spacing: 0.5px;
        text-shadow: 0 3px 16px rgba(80,20,120,0.45);
        animation: rise 0.6s ease-out 0.15s both;
      }
      .sub {
        margin-top: 8px; font-size: 12px; font-weight: 700;
        color: rgba(255,255,255,0.92); letter-spacing: 3px;
        animation: rise 0.6s ease-out 0.28s both;
      }
      @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

      /* カラフルなドット */
      .dots { margin-top: 26px; display: flex; gap: 9px; justify-content: center; animation: rise 0.6s ease-out 0.4s both; }
      .dots i {
        width: 10px; height: 10px; border-radius: 50%; display: block;
        animation: bounce 1.1s ease-in-out infinite;
        box-shadow: 0 3px 10px rgba(0,0,0,0.18);
      }
      .dots i:nth-child(1) { background: #22d3ee; animation-delay: 0s; }
      .dots i:nth-child(2) { background: #4ade80; animation-delay: .12s; }
      .dots i:nth-child(3) { background: #facc15; animation-delay: .24s; }
      .dots i:nth-child(4) { background: #fb923c; animation-delay: .36s; }
      .dots i:nth-child(5) { background: #ec4899; animation-delay: .48s; }
      @keyframes bounce { 0%,100% { transform: translateY(0); opacity: .65; } 50% { transform: translateY(-10px); opacity: 1; } }

      .ver {
        position: absolute; bottom: 14px; right: 16px; z-index: 3;
        font-size: 11px; font-weight: 800; letter-spacing: 0.8px;
        color: #fff;
        padding: 4px 10px; border-radius: 999px;
        background: rgba(255,255,255,0.22);
        border: 1px solid rgba(255,255,255,0.45);
        backdrop-filter: blur(6px);
        box-shadow: 0 4px 14px rgba(60,10,100,0.25);
        animation: rise 0.6s ease-out 0.55s both;
      }
      /* キラキラ */
      .star { position: absolute; z-index: 1; font-size: 16px; animation: tw 1.8s ease-in-out infinite; }
      @keyframes tw { 0%,100% { opacity: .25; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="aurora"></div>
      <div class="sheen"></div>

      <span class="star" style="top:18%; left:14%; animation-delay:0s">✨</span>
      <span class="star" style="top:26%; right:16%; animation-delay:.5s">⭐</span>
      <span class="star" style="bottom:24%; left:20%; animation-delay:.9s">💫</span>
      <span class="star" style="bottom:20%; right:18%; animation-delay:1.3s">✨</span>

      <div class="inner">
        <div class="logo">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <defs>
              <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#22D3EE" />
                <stop offset="0.5" stop-color="#A855F7" />
                <stop offset="1" stop-color="#EC4899" />
              </linearGradient>
            </defs>
            <path d="M7 4 L20 12 L7 20 Z" fill="url(#pg)" />
          </svg>
        </div>
        <h1>DayDream Studio</h1>
        <div class="sub">LIVE VISUAL STUDIO</div>
        <div class="dots"><i></i><i></i><i></i><i></i><i></i></div>
      </div>

      <div class="ver" id="ver">Ver.—</div>
    </div>

    <script>
      // メインプロセスから ?v=1.0.13 の形で渡される
      const v = new URLSearchParams(location.search).get('v')
      document.getElementById('ver').textContent = v ? 'Ver.' + v : 'Ver.1.0'
    </script>
  </body>
</html>
